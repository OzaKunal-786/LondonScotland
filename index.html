<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Travel Planner 2026</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- HEADER -->
    <header class="site-header" id="siteHeader">
        <div class="header-inner" id="headerContent"></div>
    </header>

    <!-- MODALS -->
    <div class="modal-overlay" id="hacksModal">
        <div class="modal-card">
            <div class="modal-header">
                <h2>💰 Smart Hacks & Tips</h2>
                <button onclick="closeModal('hacksModal')" class="modal-close"><i class="fas fa-xmark"></i></button>
            </div>
            <div class="modal-body" id="hacksContent"></div>
        </div>
    </div>

    <div class="modal-overlay" id="emergencyModal">
        <div class="modal-card">
            <div class="modal-header emergency">
                <h2>🚨 Emergency Info</h2>
                <button onclick="closeModal('emergencyModal')" class="modal-close"><i class="fas fa-xmark"></i></button>
            </div>
            <div class="modal-body" id="emergencyContent"></div>
        </div>
    </div>

	<div class="modal-overlay" id="foodModal">
        <div class="modal-card">
            <div class="modal-header">
                <h2>🍽️ Food Guide</h2>
                <button onclick="closeModal('foodModal')" class="modal-close"><i class="fas fa-xmark"></i></button>
            </div>
            <div class="modal-body" id="foodContent"></div>
        </div>
    </div>

    <!-- ADMIN MODAL -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal-card admin-modal">
            <div class="modal-header">
                <h2>🔐 Admin Panel</h2>
                <button onclick="closeModal('adminModal')" class="modal-close"><i class="fas fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div id="adminLoginArea">
                    <p class="admin-tip">Enter your GitHub Personal Access Token to manage files.</p>
                    <input type="password" id="adminToken" placeholder="GitHub Token (classic)" class="admin-input">
                    <input type="text" id="adminRepo" placeholder="username/repo-name" class="admin-input">
                    <button onclick="loginAdmin()" class="btn-admin-primary">Login / Connect</button>
                </div>
                <div id="adminDashboard" class="hidden">
                    <div class="admin-section">
                        <h3>📝 Edit Itinerary</h3>
                        <p class="admin-subtext">Edits will be committed to GitHub directly.</p>
                        <select id="adminTripSelect" class="admin-input" onchange="loadTripForEdit()"></select>
                        <textarea id="tripEditor" class="admin-textarea" spellcheck="false"></textarea>
                        <button onclick="saveTripToGithub()" id="saveBtn" class="btn-admin-primary"><i class="fas fa-save"></i> Save Changes</button>
                    </div>
                    <hr class="admin-hr">
                    <div class="admin-section">
                        <h3>📂 Upload Document</h3>
                        <p class="admin-subtext">Upload tickets/PDFs to the 'docs/' folder.</p>
                        <input type="file" id="adminFile" class="admin-input">
                        <button onclick="uploadFileToGithub()" id="uploadBtn" class="btn-admin-primary"><i class="fas fa-upload"></i> Upload to GitHub</button>
                    </div>
                    <button onclick="logoutAdmin()" class="btn-admin-outline">Logout</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main id="mainContainer" class="main-container"></main>

    <!-- BOTTOM NAV -->
    <nav id="bottomNav" class="bottom-nav hidden">
        <button onclick="toggleAllDays()" class="nav-icon" title="Collapse/Expand All"><i class="fas fa-layer-group"></i></button>
        <button onclick="showHacks()" id="hacksBtn" class="nav-main-btn">💰 HACKS & TIPS</button>
        <button onclick="window.scrollTo({top:0,behavior:'smooth'})" class="nav-icon" title="Scroll to top"><i class="fas fa-arrow-up"></i></button>
    </nav>

    <!-- FOOTER ADMIN LINK -->
    <footer class="site-footer">
        <button onclick="openAdmin()" class="admin-access-btn"><i class="fas fa-lock"></i></button>
    </footer>

    <!-- TRIP DATA FILES -->
    <script src="trips/london.js"></script>
    <script src="trips/scotland.js"></script>

    <!-- APP ENGINE -->
    <script src="js/app.js"></script>

</body>
</html>
