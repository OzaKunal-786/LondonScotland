                        time: "10:30", title: "National Museum of Scotland", icon: "museum", loc: "EH1 1JF",
                        desc: "World-class museum — dinosaurs, space, Scottish history, all free.",
                        duration: "2-3 hrs", cost: "FREE",
                        do: "See Dolly the Sheep, the Millennium Clock, and the rooftop terrace. Science floor is Kabir-perfect.",
                        eat: "Museum café is pricey. Oink on Victoria St (5 min walk) is better value.",
                        famous: "Top-rated family attraction in Scotland. Home to Dolly the cloned sheep.",
                        photoSpot: "📸 Grand Gallery atrium — look up. Rooftop terrace for castle view.",
                        hack: "Start on the TOP floor and work down — everyone else goes up, you beat the crowds.",
                        link: "https://www.google.com/search?q=National+Museum+of+Scotland+highlights"
                    },
                    {
                        time: "14:00", title: "Royal Mile & Castle View", icon: "landmark", loc: "EH1 2PB",
                        desc: "Historic spine of Edinburgh's Old Town.",
                        duration: "1.5 hrs walking", cost: "Free (Castle: £19.50 adult, skip if budget-tight)",

                        famous: "The closes (alleyways) hide secret courtyards and ghost stories.",

                        photoSpot: "📸 Castle from Grassmarket. Victoria Street curve. Scott Monument from Princes St.",

                    },
                    {

                        desc: "Curved, colourful street — inspiration for Diagon Alley.",
                        duration: "30 min", cost: "Free (shopping extra!)",
                        do: "Tell Kabir this is where wizards shop. Visit the joke shop and the Harry Potter store.",
                        famous: "JK Rowling wrote Harry Potter in Edinburgh. This street inspired Diagon Alley.",
                        photoSpot: "📸 From the top looking down the curve. Colourful shopfronts pop in any light.",
                        hack: "The Harry Potter shop is a tourist trap. The joke shop next door is more fun and cheaper.",
                        link: "https://www.google.com/search?q=Victoria+Street+Edinburgh+Diagon+Alley"
                    },
                    {
                        time: "18:00", title: "Farewell Curry", icon: "bowl-food", loc: "Nicolson St",
                        desc: "Edinburgh's curry corridor — best Indian food in Scotland.",
                        duration: "1.5 hrs", cost: "£10-15pp",
                        do: "Mother India for home-style. Kismot for adventurous. Both have kids menus.",
                        famous: "Edinburgh has the best Indian food in the UK outside London (arguably).",

                        link: "https://www.google.com/search?q=best+indian+food+Edinburgh"
                    }
                ]
            },
            {
                day: 7, date: "May 4", title: "Departure Day", route: "Queensferry → EDI Airport → Home",
                hotel: "End of Trip ✈️", hotelLink: "#", hotelLoc: "EDI",
                grocery: "M&S Airport (grab flight snacks)", groceryLoc: "EH12 9DN",
                driving: { km: 15, time: "20 min", warnings: "Return rental with full tank.", fuelStop: "Queensferry Tesco — fill before driving to airport" },
                meals: {
                    breakfast: { name: "Premier Inn (included)", cost: "Included", link: "" },
                    lunch: { name: "Airport Wetherspoons (cheapest airside)", cost: "£8-12pp", link: "https://www.google.com/search?q=Edinburgh+Airport+food+options" },
                    dinner: { name: "Home 🏠", cost: "Free!", link: "" }
                },
                stops: [
                    {
                        time: "08:00", title: "Queensferry Morning Walk", icon: "person-walking", loc: "EH30 9PP",
                        desc: "Final morning — harbour walk with bridge views.",
                        duration: "30 min", cost: "Free",
                        do: "Coffee from the harbour café. One last bridge photo. Say goodbye to Scotland.",
                        photoSpot: "📸 Forth Rail Bridge from the harbour at sunrise. Red paint glows in morning light.",
                        link: "https://www.google.com/search?q=South+Queensferry+harbour+walk"
                    },
                    {
                        time: "10:00", title: "Rental Return & Fly", icon: "car-side", loc: "EDI Airport",
                        desc: "Return car and check in.",
                        duration: "1 hr", cost: "Pre-paid",
                        hack: "Fill fuel in Queensferry BEFORE the airport — airport stations charge 20p more. Photo the car's mileage and fuel gauge before handing back.",

                    }
                ]
            }
        ]
    };

    /* ===== RENDER ===== */
    function render() {
        const container = document.getElementById('itinerary-container');
        container.innerHTML = tripData.days.map(day => `
            <div class="day-card glass-card rounded-[2.5rem] overflow-hidden mb-6" id="day-${day.day}">
                <div class="p-6 flex items-center justify-between cursor-pointer" onclick="toggleDay(${day.day})">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex flex-col items-center justify-center text-white shadow-lg">
                            <span class="text-[9px] font-black uppercase opacity-70">${day.date.split(' ')[0]}</span>
                            <span class="text-xl font-bold">${day.date.split(' ')[1]}</span>
                        </div>
                        <div>
                            <h2 class="text-lg font-extrabold text-blue-900 italic">Day ${day.day}: ${day.title}</h2>
                            <p class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">${day.route}</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-down text-blue-200 chevron transition-all"></i>
                </div>
                <div class="day-content px-6 pb-8 space-y-4">
                    <!-- Driving -->
                    <div class="bg-slate-50/50 border border-slate-100 p-4 rounded-2xl">
                        <div class="grid grid-cols-3 gap-3 text-center">
                            <div><div class="text-[9px] font-black uppercase text-slate-400">Distance</div><div class="text-sm font-extrabold text-slate-700">${day.driving.km} km</div></div>
                            <div><div class="text-[9px] font-black uppercase text-slate-400">Drive Time</div><div class="text-sm font-extrabold text-slate-700">${day.driving.time}</div></div>
                            <div><div class="text-[9px] font-black uppercase text-slate-400">Fuel</div><div class="text-[10px] font-bold text-slate-600">${day.driving.fuelStop}</div></div>
                        </div>
                        ${day.driving.warnings ? `<div class="text-[10px] text-amber-700 font-semibold bg-amber-50 rounded-lg p-2 mt-3"><i class="fas fa-triangle-exclamation mr-1"></i>${day.driving.warnings}</div>` : ''}
                    </div>
                    <!-- Grocery -->
                    <div class="bg-emerald-50/50 border border-emerald-100 p-4 rounded-2xl flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-emerald-100 rounded-lg flex items-center justify-center text-emerald-600"><i class="fas fa-shopping-basket text-xs"></i></div>
                            <div><span class="text-[9px] font-black uppercase text-emerald-500 block">Cheapest Groceries</span><span class="text-xs font-bold text-emerald-900">${day.grocery}</span></div>
                        </div>
                        <a href="https://www.google.com/maps/search/${day.groceryLoc}" target="_blank" class="bg-emerald-600 text-white text-[9px] font-black px-4 py-2 rounded-lg uppercase">Map</a>
                    </div>
                    <!-- Hotel -->
                    <div class="bg-indigo-50/50 border border-indigo-100 p-4 rounded-2xl flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-indigo-100 rounded-lg flex items-center justify-center text-indigo-600"><i class="fas fa-bed text-xs"></i></div>
                            <div><span class="text-[9px] font-black uppercase text-indigo-500 block">Tonight's Stay</span><span class="text-xs font-bold text-indigo-900">${day.hotel}</span></div>
                        </div>
                        <div class="flex gap-2">
                            <a href="https://www.google.com/maps/search/${day.hotelLoc}" target="_blank" class="bg-indigo-600 text-white text-[9px] font-black px-4 py-2 rounded-lg uppercase">Map</a>
                            <a href="${day.hotelLink}" target="_blank" class="bg-white border border-indigo-200 text-indigo-600 text-[9px] font-black px-4 py-2 rounded-lg uppercase">Info</a>
                        </div>
                    </div>
                    <!-- Meals -->
                    <div class="bg-orange-50/50 border border-orange-100 p-4 rounded-2xl space-y-2">
                        <div class="text-[9px] font-black uppercase text-orange-400 mb-2"><i class="fas fa-utensils mr-1"></i>Meal Plan</div>
                        ${['breakfast','lunch','dinner'].map(m => {
                            const meal = day.meals[m];
                            return `<div class="flex items-center justify-between">
                                <div class="flex items-center gap-2">
                                    <span class="text-[9px] font-black uppercase text-orange-300 w-14">${m}</span>
                                    <span class="text-xs font-bold text-orange-900">${meal.name}</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-semibold text-orange-600">${meal.cost}</span>
                                    ${meal.link ? `<a href="${meal.link}" target="_blank" class="text-orange-400 text-xs"><i class="fas fa-arrow-up-right-from-square"></i></a>` : ''}
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                    <!-- Stops -->
                    ${day.stops.map((stop, sIdx) => {
                        const id = `d${day.day}s${sIdx}`;
                        const done = localStorage.getItem(id) === 'true';
                        return `
                        <div class="relative pl-8 border-l-2 border-blue-50 ${done ? 'item-done' : ''}">
                            <div class="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-white border-2 ${done ? 'border-emerald-500 bg-emerald-500' : 'border-indigo-400'} shadow-sm"></div>
                            <div class="flex justify-between items-start">
                                <div>
                                    <span class="text-[10px] font-black text-blue-400 uppercase tracking-tighter">${stop.time}</span>
                                    <h3 class="font-bold text-blue-900"><i class="fas fa-${stop.icon} text-indigo-300 mr-1 text-xs"></i>${stop.title}</h3>
                                    <div class="flex gap-3 mt-1">
                                        ${stop.duration ? `<span class="text-[9px] font-bold text-slate-400"><i class="far fa-clock mr-0.5"></i>${stop.duration}</span>` : ''}
                                        ${stop.cost ? `<span class="text-[9px] font-bold text-emerald-500"><i class="fas fa-tag mr-0.5"></i>${stop.cost}</span>` : ''}
                                    </div>
                                </div>
                                <button onclick="markDone('${id}')" class="text-2xl ml-2 shrink-0"><i class="${done ? 'fas fa-check-circle text-emerald-500' : 'far fa-circle text-blue-100'}"></i></button>
                            </div>
                            <p class="text-sm text-slate-500 mt-1 mb-2">${stop.desc}</p>
                            <div class="detail-block space-y-2 pt-1">
                                ${stop.famous ? `<div class="p-3 bg-blue-50/50 rounded-xl text-xs font-medium text-blue-800 border border-blue-100/30"><span class="block text-[9px] font-black uppercase text-blue-400 mb-1">⭐ Famous For</span>${stop.famous}</div>` : ''}
                                ${stop.do ? `<div class="p-3 bg-amber-50/50 rounded-xl text-xs font-medium text-amber-900 border border-amber-100/30"><span class="block text-[9px] font-black uppercase text-amber-500 mb-1">🎯 Do This</span>${stop.do}</div>` : ''}
                                ${stop.eat ? `<div class="p-3 bg-orange-50/50 rounded-xl text-xs font-medium text-orange-900 border border-orange-100/30"><span class="block text-[9px] font-black uppercase text-orange-400 mb-1">🍽️ Eat Here</span>${stop.eat}</div>` : ''}
                                ${stop.legend ? `<div class="p-3 bg-indigo-50 rounded-xl text-xs italic font-semibold text-indigo-900 border border-indigo-100"><span class="block text-[9px] font-black uppercase text-indigo-400 mb-1">📜 Legend</span>${stop.legend}</div>` : ''}
                                ${stop.photoSpot ? `<div class="p-3 bg-pink-50 rounded-xl text-xs font-medium text-pink-800 border border-pink-100"><span class="block text-[9px] font-black uppercase text-pink-400 mb-1">📸 Photo Spot</span>${stop.photoSpot}</div>` : ''}
                                ${stop.hack ? `<div class="p-3 bg-emerald-50 rounded-xl text-xs font-bold text-emerald-800 border border-emerald-100"><span class="block text-[9px] font-black uppercase text-emerald-500 mb-1">💡 Hack</span>${stop.hack}</div>` : ''}
                                <div class="flex gap-2 pt-2">
                                    <a href="https://www.google.com/maps/search/${encodeURIComponent(stop.title + ' ' + stop.loc)}" target="_blank" class="bg-blue-900 text-white text-[9px] font-black px-4 py-2 rounded-lg uppercase">Map</a>
                                    <a href="${stop.link}" target="_blank" class="bg-white border border-blue-100 text-blue-400 text-[9px] font-black px-4 py-2 rounded-lg uppercase">Learn More</a>
                                </div>
                            </div>
                        </div>`;
                    }).join('')}
                </div>
            </div>
        `).join('');
        renderDayJumper();
        updateProgress();
    }

    /* ===== DAY JUMPER ===== */
    function renderDayJumper() {
        document.getElementById('dayJumper').innerHTML = tripData.days.map(day => {
            const allDone = day.stops.every((_, i) => localStorage.getItem(`d${day.day}s${i}`) === 'true');
            return `<button onclick="jumpToDay(${day.day})" class="flex-1 py-1.5 rounded-lg text-[10px] font-black transition-all ${allDone ? 'bg-emerald-500 text-white' : 'bg-blue-50 text-blue-400 hover:bg-indigo-100'}">${day.day}</button>`;
        }).join('');
    }
    function jumpToDay(d) {
        const el = document.getElementById(`day-${d}`);
        el.classList.remove('day-collapsed');
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ===== PROGRESS ===== */
    function updateProgress() {
        let total = 0, done = 0;
        tripData.days.forEach(day => day.stops.forEach((_, i) => { total++; if (localStorage.getItem(`d${day.day}s${i}`) === 'true') done++; }));
        const pct = total ? Math.round((done / total) * 100) : 0;
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('progressLabel').innerText = `${done}/${total} stops`;
    }

    /* ===== MODALS ===== */
    function showHacks() {
        document.getElementById('hacksContent').innerHTML = tripData.hacks.map(h => `
            <div class="flex items-start gap-3 p-3 bg-white/50 rounded-xl border border-blue-50">
                <span class="text-xl">${h.icon}</span>
                <div><div class="text-xs font-extrabold text-blue-900">${h.title}</div><div class="text-xs text-slate-600">${h.text}</div></div>
            </div>`).join('');
        document.getElementById('hacksModal').classList.add('active');
    }
    function showEmergency() {
        const e = tripData.emergency;
        document.getElementById('emergencyContent').innerHTML = `
            <div class="space-y-2">
                ${e.numbers.map(n => `
                    <a href="tel:${n.value.replace(/\s/g,'')}" class="flex items-center gap-3 p-3 bg-red-50 rounded-xl border border-red-100">
                        <div class="w-8 h-8 bg-red-100 rounded-lg flex items-center justify-center text-red-500"><i class="fas fa-${n.icon} text-xs"></i></div>
                        <div class="flex-1"><div class="text-[9px] font-black uppercase text-red-400">${n.label}</div><div class="text-sm font-extrabold text-red-800">${n.value}</div></div>
                        <i class="fas fa-phone text-red-300"></i>
                    </a>`).join('')}
            </div>
            <div class="mt-4">
                <div class="text-[9px] font-black uppercase text-red-400 mb-2">🏥 Nearest Hospitals</div>
                ${e.hospitals.map(h => `
                    <div class="flex items-center justify-between p-2 border-b border-red-50">
                        <div><div class="text-xs font-bold text-slate-800">${h.name}</div><div class="text-[10px] text-slate-400">${h.phone}</div></div>
                        <a href="https://www.google.com/maps/search/${h.loc}" target="_blank" class="bg-red-500 text-white text-[9px] font-black px-3 py-1.5 rounded-lg">Map</a>
                    </div>`).join('')}
            </div>
            <div class="mt-4">
                <div class="text-[9px] font-black uppercase text-red-400 mb-2">📱 Essential Apps</div>
                <div class="flex flex-wrap gap-1">${e.apps.map(a => `<span class="bg-white border border-red-100 text-slate-700 text-[10px] font-bold px-3 py-1 rounded-full">${a}</span>`).join('')}</div>
            </div>`;
        document.getElementById('emergencyModal').classList.add('active');
    }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    /* ===== INTERACTIONS ===== */
    function toggleDay(id) { document.getElementById(`day-${id}`).classList.toggle('day-collapsed'); }
    function toggleViewMode() {
        const main = document.getElementById('itinerary-container');
        const isSummary = main.classList.contains('summary-view');
        main.classList.toggle('summary-view', !isSummary);
        main.classList.toggle('detailed-view', isSummary);
        document.getElementById('viewLabel').innerText = isSummary ? "Summary" : "Detailed";
    }
    function toggleAllDays() {
        const all = document.querySelectorAll('.day-card');
        const anyOpen = Array.from(all).some(d => !d.classList.contains('day-collapsed'));
        all.forEach(d => anyOpen ? d.classList.add('day-collapsed') : d.classList.remove('day-collapsed'));
    }
    function markDone(id) { localStorage.setItem(id, localStorage.getItem(id) !== 'true'); render(); }

    /* ===== INIT ===== */
    render();
    document.querySelectorAll('.day-card').forEach(d => d.classList.add('day-collapsed'));
    </script>
</body>
</html>
